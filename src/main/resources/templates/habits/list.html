<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Habits — Habit Tracker</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <div th:replace="~{fragments/flash :: flash}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">My Habits</h1>
        <a th:href="@{/habits/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>New Habit
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${habits.isEmpty()}" class="text-center py-5">
        <i class="bi bi-clipboard-plus display-4 text-muted"></i>
        <p class="mt-3 text-muted">No habits yet. <a th:href="@{/habits/new}">Create one</a>.</p>
    </div>

    <!-- Table -->
    <div th:unless="${habits.isEmpty()}" class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th></th>
                    <th>Name</th>
                    <th>Created</th>
                    <th class="text-center">Streak</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="habit : ${habits}">
                    <td>
                        <span class="color-swatch d-inline-block rounded"
                              th:style="'background:' + ${habit.color}"
                              style="width:18px;height:18px;"></span>
                    </td>
                    <td>
                        <span class="me-1" th:text="${habit.icon}"></span>
                        <strong th:text="${habit.name}"></strong>
                        <div class="small text-muted" th:text="${habit.description ?: ''}"></div>
                    </td>
                    <td class="text-muted small"
                        th:text="${#temporals.format(habit.createdAt, 'MMM d, yyyy')}"></td>
                    <td class="text-center">
                        <span class="streak-badge" th:text="${streaks[habit.id]} + '🔥'"></span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/habits/{id}/stats(id=${habit.id})}"
                           class="btn btn-sm btn-outline-primary me-1" title="Stats">
                            <i class="bi bi-bar-chart"></i>
                        </a>
                        <a th:href="@{/habits/{id}/calendar(id=${habit.id})}"
                           class="btn btn-sm btn-outline-secondary me-1" title="Calendar">
                            <i class="bi bi-calendar3"></i>
                        </a>
                        <a th:href="@{/habits/{id}/edit(id=${habit.id})}"
                           class="btn btn-sm btn-outline-secondary me-1" title="Edit">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/habits/{id}/delete(id=${habit.id})}"
                              method="post" class="d-inline confirm-delete">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<footer class="text-center text-muted py-3 mt-4 border-top" style="font-size:0.8rem">
    Habit Tracker — Keep your streaks alive 🔥
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

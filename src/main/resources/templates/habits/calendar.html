<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${habit.name} + ' — Calendar'"></title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/habits}">Habits</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/habits/{id}/stats(id=${habit.id})}" th:text="${habit.name}"></a>
            </li>
            <li class="breadcrumb-item active">Calendar</li>
        </ol>
    </nav>

    <div class="d-flex align-items-center mb-4">
        <span class="fs-3 me-2" th:text="${habit.icon}"></span>
        <h1 class="h3 mb-0" th:text="${habit.name}"></h1>
    </div>

    <!-- Month navigation -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a th:href="@{/habits/{id}/calendar(id=${habit.id}, year=${prevMonth.year}, month=${prevMonth.monthValue})}"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-chevron-left"></i> Prev
        </a>
        <h5 class="mb-0" th:text="${#temporals.format(yearMonth.atDay(1), 'MMMM yyyy')}"></h5>
        <a th:href="@{/habits/{id}/calendar(id=${habit.id}, year=${nextMonth.year}, month=${nextMonth.monthValue})}"
           class="btn btn-outline-secondary btn-sm">
            Next <i class="bi bi-chevron-right"></i>
        </a>
    </div>

    <!-- Calendar grid -->
    <div class="card shadow-sm">
        <div class="card-body p-2">
            <table class="table table-bordered mb-0 calendar-table">
                <thead class="table-light">
                <tr>
                    <th class="text-center">Sun</th>
                    <th class="text-center">Mon</th>
                    <th class="text-center">Tue</th>
                    <th class="text-center">Wed</th>
                    <th class="text-center">Thu</th>
                    <th class="text-center">Fri</th>
                    <th class="text-center">Sat</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="week : ${weeks}">
                    <td th:each="day : ${week}" class="calendar-day text-center p-1"
                        th:classappend="${day == null} ? 'calendar-empty' :
                                        (${completedSet.contains(day)} ? ' completed' :
                                        (${day.isAfter(today)} ? ' future' : ' missed'))">
                        <span th:if="${day != null}" th:text="${day.dayOfMonth}"></span>
                        <span th:if="${day != null and completedSet.contains(day)}"
                              class="d-block small">✓</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Legend -->
    <div class="d-flex gap-3 mt-3 small text-muted">
        <span><span class="legend-dot completed-dot"></span> Completed</span>
        <span><span class="legend-dot missed-dot"></span> Missed</span>
        <span><span class="legend-dot future-dot"></span> Future</span>
    </div>

    <div class="mt-3">
        <a th:href="@{/habits/{id}/stats(id=${habit.id})}" class="btn btn-outline-secondary">
            <i class="bi bi-bar-chart me-1"></i>Stats View
        </a>
        <a th:href="@{/habits}" class="btn btn-secondary ms-2">Back</a>
    </div>

</main>

<footer class="text-center text-muted py-3 mt-4 border-top" style="font-size:0.8rem">
    Habit Tracker — Keep your streaks alive 🔥
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

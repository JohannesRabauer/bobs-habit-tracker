<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${habit.name} + ' — Stats'"></title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/habits}">Habits</a></li>
            <li class="breadcrumb-item active" th:text="${habit.name}"></li>
        </ol>
    </nav>

    <!-- Header -->
    <div class="d-flex align-items-center mb-4">
        <span class="display-5 me-3" th:text="${habit.icon}"></span>
        <div>
            <h1 class="h3 mb-0" th:text="${habit.name}"></h1>
            <small class="text-muted" th:text="${habit.description ?: ''}"></small>
        </div>
    </div>

    <!-- Summary cards -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <div class="fs-2 fw-bold text-warning" th:text="${stats.currentStreak()} + '🔥'"></div>
                    <div class="small text-muted">Current Streak</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <div class="fs-2 fw-bold text-info" th:text="${stats.longestStreak()} + ' days'"></div>
                    <div class="small text-muted">Longest Streak</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <div class="fs-2 fw-bold text-success" th:text="${stats.totalCompleted()}"></div>
                    <div class="small text-muted">Total Completions</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <div class="fs-2 fw-bold text-primary"
                         th:text="${#numbers.formatDecimal(stats.completionRate(), 1, 1)} + '%'"></div>
                    <div class="small text-muted">30-day Rate</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="card shadow-sm mb-4">
        <div class="card-header">Last 30 Days</div>
        <div class="card-body">
            <canvas id="completionChart" height="80"></canvas>
        </div>
    </div>

    <!-- Badges -->
    <div class="card shadow-sm mb-4">
        <div class="card-header">Badges</div>
        <div class="card-body badge-shelf">
            <div th:if="${stats.badges().isEmpty()}" class="text-muted small">
                No badges yet — keep going!
            </div>
            <div th:each="badge : ${stats.badges()}"
                 th:class="'badge-pill badge-' + ${badge.type.toLowerCase()}"
                 class="badge-pill">
                <span th:switch="${badge.type}">
                    <span th:case="'STREAK_7'">🔥 7-Day Streak</span>
                    <span th:case="'STREAK_30'">🏆 30-Day Streak</span>
                    <span th:case="'STREAK_100'">💎 100-Day Streak</span>
                    <span th:case="'RATE_50'">⭐ 50% Rate</span>
                    <span th:case="'RATE_80'">🌟 80% Rate</span>
                    <span th:case="'RATE_100'">🎯 Perfect Month</span>
                    <span th:case="*" th:text="${badge.type}"></span>
                </span>
                <small class="d-block text-muted"
                       th:text="'Earned ' + ${#temporals.format(badge.earnedAt, 'MMM d, yyyy')}"></small>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <a th:href="@{/habits/{id}/calendar(id=${habit.id})}" class="btn btn-outline-secondary">
            <i class="bi bi-calendar3 me-1"></i>Calendar View
        </a>
        <a th:href="@{/habits}" class="btn btn-secondary">Back</a>
    </div>

</main>

<footer class="text-center text-muted py-3 mt-4 border-top" style="font-size:0.8rem">
    Habit Tracker — Keep your streaks alive 🔥
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:inline="javascript">
    const labels = /*[[${chartLabels}]]*/ [];
    const data   = /*[[${chartData}]]*/ [];
    new Chart(document.getElementById('completionChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Completed',
                data: data,
                backgroundColor: /*[[${habit.color}]]*/ '#4CAF50',
                borderRadius: 3
            }]
        },
        options: {
            scales: {
                y: { beginAtZero: true, max: 1, ticks: { stepSize: 1 } },
                x: { ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 10 } }
            },
            plugins: { legend: { display: false } }
        }
    });
</script>
</body>
</html>

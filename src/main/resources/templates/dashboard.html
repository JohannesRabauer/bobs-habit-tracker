<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Dashboard — Habit Tracker</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <div th:replace="~{fragments/flash :: flash}"></div>

    <!-- Heading -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-0">Today</h1>
            <small class="text-muted" th:text="${#temporals.format(today, 'EEEE, MMMM d, yyyy')}"></small>
        </div>
        <div class="text-end">
            <span class="badge bg-secondary fs-6"
                  th:text="${completedCount} + ' / ' + ${habits.size()} + ' completed'"></span>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${habits.isEmpty()}" class="text-center py-5">
        <i class="bi bi-clipboard-plus display-4 text-muted"></i>
        <p class="mt-3 text-muted">No habits yet. <a th:href="@{/habits/new}">Add your first habit</a>.</p>
    </div>

    <!-- Habit cards grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="habit : ${habits}">
            <div class="card h-100 habit-card"
                 th:style="'border-left: 5px solid ' + ${habit.color}">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-2">
                        <span class="fs-3 me-2" th:text="${habit.icon}"></span>
                        <h5 class="card-title mb-0 text-truncate" th:text="${habit.name}"></h5>
                    </div>
                    <p class="card-text text-muted small text-truncate"
                       th:text="${habit.description != null ? habit.description : ''}"></p>
                </div>
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <form th:action="@{/track/{id}(id=${habit.id})}" method="post">
                        <button type="submit"
                                th:class="${todayStatus[habit.id] ? 'btn btn-success btn-sm' : 'btn btn-outline-secondary btn-sm'}">
                            <i th:class="${todayStatus[habit.id] ? 'bi bi-check-circle-fill me-1' : 'bi bi-circle me-1'}"></i>
                            <span th:text="${todayStatus[habit.id] ? 'Done' : 'Mark done'}"></span>
                        </button>
                    </form>
                    <div>
                        <a th:href="@{/habits/{id}/stats(id=${habit.id})}"
                           class="btn btn-outline-primary btn-sm me-1" title="Stats">
                            <i class="bi bi-bar-chart"></i>
                        </a>
                        <a th:href="@{/habits/{id}/calendar(id=${habit.id})}"
                           class="btn btn-outline-secondary btn-sm" title="Calendar">
                            <i class="bi bi-calendar3"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<footer class="text-center text-muted py-3 mt-4 border-top" style="font-size:0.8rem">
    Habit Tracker — Keep your streaks alive 🔥
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>

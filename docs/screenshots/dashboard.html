<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dashboard — Habit Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>
:root{--color-primary:#3b82d4;--color-success:#22c55e}
.habit-card{transition:transform .15s ease,box-shadow .15s ease;border-radius:.5rem;overflow:hidden}
.streak-badge{display:inline-block;padding:.15rem .55rem;border-radius:999px;background:#fff3cd;color:#856404;font-size:.8rem;font-weight:600;border:1px solid #ffe08a}
body{background:#f8f9fa}
</style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">📋 Habit Tracker</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">🏠 Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="#">☑️ Habits</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3 mb-0">Today</h1>
      <small class="text-muted">Wednesday, June 18, 2025</small>
    </div>
    <div class="text-end">
      <span class="badge bg-secondary fs-6">2 / 3 completed</span>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

    <!-- Card 1: Morning Run — done -->
    <div class="col">
      <div class="card h-100 habit-card" style="border-left:5px solid #ef4444">
        <div class="card-body">
          <div class="d-flex align-items-center mb-2">
            <span class="fs-3 me-2">🏃</span>
            <h5 class="card-title mb-0">Morning Run</h5>
          </div>
          <p class="card-text text-muted small">30 minutes before breakfast</p>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <button class="btn btn-success btn-sm">
            <i class="bi bi-check-circle-fill me-1"></i>Done
          </button>
          <div>
            <a class="btn btn-outline-primary btn-sm me-1" title="Stats"><i class="bi bi-bar-chart"></i></a>
            <a class="btn btn-outline-secondary btn-sm" title="Calendar"><i class="bi bi-calendar3"></i></a>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 2: Read 20 pages — done -->
    <div class="col">
      <div class="card h-100 habit-card" style="border-left:5px solid #3b82f6">
        <div class="card-body">
          <div class="d-flex align-items-center mb-2">
            <span class="fs-3 me-2">📚</span>
            <h5 class="card-title mb-0">Read 20 Pages</h5>
          </div>
          <p class="card-text text-muted small">Non-fiction or technical books</p>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <button class="btn btn-success btn-sm">
            <i class="bi bi-check-circle-fill me-1"></i>Done
          </button>
          <div>
            <a class="btn btn-outline-primary btn-sm me-1" title="Stats"><i class="bi bi-bar-chart"></i></a>
            <a class="btn btn-outline-secondary btn-sm" title="Calendar"><i class="bi bi-calendar3"></i></a>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 3: Meditate — not done -->
    <div class="col">
      <div class="card h-100 habit-card" style="border-left:5px solid #8b5cf6">
        <div class="card-body">
          <div class="d-flex align-items-center mb-2">
            <span class="fs-3 me-2">🧘</span>
            <h5 class="card-title mb-0">Meditate</h5>
          </div>
          <p class="card-text text-muted small">10 minutes of mindfulness</p>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <button class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-circle me-1"></i>Mark done
          </button>
          <div>
            <a class="btn btn-outline-primary btn-sm me-1" title="Stats"><i class="bi bi-bar-chart"></i></a>
            <a class="btn btn-outline-secondary btn-sm" title="Calendar"><i class="bi bi-calendar3"></i></a>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<footer class="text-center text-muted py-3 mt-4 border-top" style="font-size:0.8rem">
  Habit Tracker — Keep your streaks alive 🔥
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
